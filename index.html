  <!-- Meta Pixel — fires only if window.META_PIXEL_ID is set (injected at build time
       or by the Vercel env-var-to-window pattern). Server-side CAPI events share
       the same event_id with the Pixel for Events Manager dedup. -->
  <script>
    (function(){
      // The pixel id can be set by a downstream snippet that reads from a meta tag
      // or window global. Without it, the pixel snippet still loads but does nothing.
      var pid = window.META_PIXEL_ID || (document.querySelector('meta[name="meta-pixel-id"]') || {}).content;
      if (!pid) return;
      !function(f,b,e,v,n,t,s){
        if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];
        t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s);
      }(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
      window.fbq('init', pid);
      window.fbq('track', 'PageView');
    })();
  </script>
